name: Angular CI

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm run test:coverage
      - name: Generate Coverage Badge
        run: |
          mkdir -p .github/badges
          COVERAGE=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          COLOR=$(node -p "const t = $COVERAGE; t >= 80 ? 'brightgreen' : t >= 60 ? 'yellow' : 'red'")
          curl -s "https://img.shields.io/badge/Coverage-${COVERAGE}%25-${COLOR}" > .github/badges/coverage.svg
      - name: Commit Coverage Badge
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update coverage badge'
          file_pattern: '.github/badges/coverage.svg'
      - name: Build and Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run deploy
